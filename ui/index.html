<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard UI - Python API</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand">
        <span class="brand-logo">API</span>
        <div class="brand-text">
          <h1>Dashboard UI</h1>
          <p>FastAPI Items Manager</p>
        </div>
      </div>
      <div class="api-status" id="api-status">
        <span class="status-dot status-dot--unknown"></span>
        <span class="status-text">Checking API...</span>
      </div>
    </header>

    <main class="app-main">
      <section class="panel panel-form">
        <div class="panel-header">
          <h2 id="form-title">Create Item</h2>
          <p id="form-subtitle">Add a new item to your API</p>
        </div>
        <form id="item-form" class="form">
          <input type="hidden" id="item-id" />

          <div class="form-row">
            <label for="name">Name</label>
            <input id="name" type="text" placeholder="e.g. Laptop" required />
          </div>

          <div class="form-row">
            <label for="description">Description</label>
            <textarea
              id="description"
              rows="3"
              placeholder="Short description of the item"
            ></textarea>
          </div>

          <div class="form-row">
            <label for="price">Price</label>
            <input
              id="price"
              type="number"
              step="0.01"
              min="0"
              placeholder="0.00"
              required
            />
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="submit-btn">
              Create Item
            </button>
            <button type="button" class="btn btn-secondary" id="reset-btn">
              Reset
            </button>
          </div>
        </form>
      </section>

      <section class="panel panel-list">
        <div class="panel-header panel-header--row">
          <div>
            <h2>Items</h2>
            <p>Data coming from your FastAPI backend</p>
          </div>
          <button class="btn btn-outline" id="refresh-btn">Refresh</button>
        </div>

        <div id="message" class="message message--hidden"></div>

        <div class="table-wrapper">
          <table class="items-table" aria-label="Items table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th>Price</th>
                <th>Created</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="items-body">
              <!-- Rows injected by JavaScript -->
            </tbody>
          </table>
          <div id="empty-state" class="empty-state">
            <p>No items yet. Create your first item using the form.</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <span>UI powered by HTML5/CSS/JS • Backend powered by FastAPI</span>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
